services:
  - type: web
    name: info-ek-balam
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && python -m gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "False"
      - key: ADMIN_USERNAME
        value: administrator
      - key: ADMIN_NAME
        value: Administrador
      - key: ADMIN_PASSWORD
        sync: false
