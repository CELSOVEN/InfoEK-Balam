<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Aplicación web desarrollada con Python y Flask"
    >

    <title>
        {% block title %}
            Proyecto Flask
        {% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/styles.css') }}"
    >
</head>

<body>
  <header class="encabezado">
    <div class="contenedor encabezado-contenido">

        <div class="grupo-logos">
            <img
                src="{{ url_for(
                    'static',
                    filename='img/logo_pypsa.png'
                ) }}"
                alt="Logo de PYPSA"
                class="logo logo-pypsa"
            >

            <div class="separador-logos"></div>

            <img
                src="{{ url_for(
                    'static',
                    filename='img/logo_sierramadre.png'
                ) }}"
                alt="Logo de Sierra Madre Resources"
                class="logo logo-sierramadre"
            >
        </div>

        <a
            href="{{ url_for('inicio') }}"
            class="nombre-portal"
        >
            InfoEk-Balam
        </a>

        <nav class="navegacion-principal">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('portal') }}">
                    Portal
                </a>
            {% endif %}
        </nav>

        </div>
    </header>

    <main class="contenedor contenido-principal">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="pie-pagina">
        <div class="contenedor">
            <p>
                InfoEk-Balam · Portal de información técnica
            </p>
        </div>
    </footer>

    <script
        src="{{ url_for('static', filename='js/scripts.js') }}"
    ></script>
</body>
</html>
