<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4622J0ZFZX"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-4622J0ZFZX');
    </script>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Información técnica del campo Ek-Balam"
    >

    <title>
        {% block title %}
            Recopilación de información del campo EK-Balam
        {% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/styles.css') }}"
    >
</head>

<body class="{% block body_class %}{% endblock %}">
  <header class="encabezado">
    <div class="contenedor encabezado-contenido">

        <div class="grupo-logos">
            <a
                href="https://pypsagroup.com/GasOil.html"
                target="_blank"
                rel="noopener noreferrer"
            >
                <img
                    src="{{ url_for(
                        'static',
                        filename='img/logo_pypsa.png'
                    ) }}"
                    alt="Logo de PYPSA"
                    class="logo logo-pypsa"
                >
            </a>

            <div class="separador-logos"></div>

            <a
                href="https://sierramadreog.com/es/"
                target="_blank"
                rel="noopener noreferrer"
            >
                <img
                    src="{{ url_for(
                        'static',
                        filename='img/logo_sierramadre.png'
                    ) }}"
                    alt="Logo de Sierra Madre Resources"
                    class="logo logo-sierramadre"
                >
            </a>
        </div>

        <a
            href="{{ url_for('inicio') }}"
            class="nombre-portal"
        >
            Info. Ek-Balam
        </a>

        <button
            type="button"
            class="boton-menu-movil"
            aria-label="Abrir menú"
            aria-expanded="false"
            aria-controls="menu-movil"
        >
            ☰
        </button>


    <nav class="navegacion-principal">

        <a href="{{ url_for('portal') }}">
            Home
        </a>
        <a href="#">
            Buscar
        </a>
        <a href="#">
            ES | EN
        </a>
    </nav>

    <nav class="menu-movil" id="menu-movil">
    <a href="{{ url_for('portal') }}">
        Home
    </a>

    <a href="{{ url_for('buscar') }}">
        Buscar
    </a>

    <a href="#">
        ES | EN
    </a>
</nav>


        </div>
    </header>

    <main class="contenedor contenido-principal">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="pie-pagina">
        <div class="contenedor">
            <p>
                InfoEk-Balam · Portal de información técnica
            </p>
        </div>
    </footer>

    <script
        src="{{ url_for('static', filename='js/scripts.js') }}"
    ></script>
</body>
</html>
